name: Build 3DAppVersionSpoofer

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Theos
      run: |
        git clone --recursive https://github.com/theos/theos.git ~/theos
        echo "THEOS=~/theos" >> $GITHUB_ENV
        echo "PATH=~/theos/bin:$PATH" >> $GITHUB_ENV
    
    - name: Install dependencies
      run: |
        brew install ldid
    
    - name: Build package
      run: |
        cd $GITHUB_WORKSPACE
        make package FINALPACKAGENAME="3DAppVersionSpoofer.deb" TARGET=iphone:clang:latest:8.0
    
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: deb-package
        path: ./packages/*.deb
